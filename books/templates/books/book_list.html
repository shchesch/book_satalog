{% extends 'books/base.html' %}
{% load static %}
{% block title %}Каталог книг{% endblock %}
{% block content %}
    <div class="book-list">
        {% for book in books %}
        <a href="{% url 'book_detail' book.id %}" class="book-card">
            <img src="{% static 'books/img/' %}{{ book.img_src }}" alt="{{ book.title }}" width="150">
            <div class="book-info">
                <h2>{{ book.title }}</h2>
                <p><strong>Автор:</strong> {{ book.authot.name }}</p>
                <p>{{ book.short_desc }}</p>
            </div>
        </a>
    {% endfor %}
    </div>
{% endblock %}
