{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'books/css/base.css' %}">
    {% block extra.css %}{% endblock %}
    <title>{% block title %}Каталог книг{% endblock %}</title>
</head>
<body>
    <header>
        <h1>Каталог книг</h1>
        <nav>
            <a href="{% url 'book_list' %}">Главная</a>
            <a href="{% url 'search' %}">Поиск книг</a>
        </nav>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
